version: '3.8'
services:
  php:
    build: .
    container_name: php_app
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wb_parser
      MYSQL_USER: wb_user
      MYSQL_PASSWORD: wb_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
